<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S1 List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h2>S1 List</h2>
    <button class="toggle" id="themeToggle">🌙</button>
  </div>

  <!-- Meals -->
  <div class="meal-section" id="meals"></div>

  <button id="saveBtn" class="save-btn">Save</button>

  <!-- Duration Dropdown -->
  <select id="duration">
    <option>30min</option>
    <option>45min</option>
    <option>1h</option>
    <option>1:15h</option>
    <option selected>1:30h</option>
    <option>1:45h</option>
    <option>2h</option>
  </select>

  <!-- Schedule -->
  <div class="schedule" id="schedule"></div>

  <script src="main.js"></script>
</body>
</html>
